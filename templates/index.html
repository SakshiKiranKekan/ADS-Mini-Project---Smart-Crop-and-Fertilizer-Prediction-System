<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AgriMind | Smart Crop & Fertilizer Advisor</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Poppins', sans-serif;
        }

        :root {
            --bg-overlay: rgba(15, 35, 20, 0.65);
            --text-color: #1e2f2c;
            --form-bg: rgba(255, 255, 255, 0.96);
            --input-bg: #f8faf8;
            --btn-bg: #2b7a3e;
            --btn-hover: #1e5a2e;
            --accent-color: #2b7a3e;
            --border-glow: rgba(43, 122, 62, 0.2);
            --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            --glass-border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .dark-mode {
            --bg-overlay: rgba(10, 20, 15, 0.85);
            --text-color: #eef4e6;
            --form-bg: rgba(26, 32, 30, 0.95);
            --input-bg: #2a2f2c;
            --btn-bg: #3e9f5a;
            --btn-hover: #2c7a46;
            --accent-color: #6fbf4c;
            --border-glow: rgba(111, 191, 76, 0.3);
            --card-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            transition: all 0.3s ease;
            background: linear-gradient(125deg, #1a4d2a 0%, #2c6e3c 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover no-repeat;
            filter: brightness(0.35) contrast(1.05);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        .flip-container {
            perspective: 2200px;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
        }

        .flip-box {
            width: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.23, 1, 0.32, 1);
            min-height: 760px;
        }

        .flip-box.active {
            transform: rotateY(180deg);
        }

        .form-box {
            position: absolute;
            width: 100%;
            min-height: 760px;
            backface-visibility: hidden;
            background: var(--form-bg);
            backdrop-filter: blur(12px);
            padding: 2rem 1.8rem;
            border-radius: 2rem;
            box-shadow: var(--card-shadow);
            border: var(--glass-border);
            transition: all 0.2s;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .fertilizer-box {
            transform: rotateY(180deg);
        }

        /* custom scroll */
        .form-box::-webkit-scrollbar {
            width: 5px;
        }
        .form-box::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .form-box::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }

        .title {
            text-align: center;
            margin-bottom: 1.8rem;
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-color), #4cae5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .input-box {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .input-box label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-color);
            opacity: 0.85;
            letter-spacing: -0.2px;
        }

        .input-box input, .input-box select {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border: 1.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 18px;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            background: var(--input-bg);
            color: var(--text-color);
            transition: all 0.2s ease;
        }

        .input-box input:focus, .input-box select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--border-glow);
        }

        .input-box i, .input-box .fas, .input-box .far {
            position: absolute;
            left: 16px;
            top: 38px;
            font-size: 1.2rem;
            color: var(--accent-color);
            opacity: 0.8;
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .toggle-link {
            text-align: center;
            margin: 24px 0 20px;
        }

        .toggle-link a {
            color: var(--accent-color);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            border-bottom: 1px dashed;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.03);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 1rem 1.2rem;
            margin: 20px 0 10px;
            display: none;
            border-left: 5px solid var(--accent-color);
            transition: 0.2s;
        }

        .dark-mode .result-box {
            background: rgba(255, 255, 255, 0.05);
        }

        .result-box.show {
            display: block;
            animation: fadeSlideUp 0.3s ease;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .result-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 8px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recommend-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--form-bg);
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
            cursor: pointer;
            font-size: 24px;
            backdrop-filter: blur(8px);
            z-index: 100;
            transition: all 0.2s;
            color: var(--accent-color);
        }

        .mode-toggle:hover {
            transform: rotate(20deg) scale(1.05);
        }

        .follow-section {
            text-align: center;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid rgba(128, 128, 128, 0.2);
        }

        .follow-section h3 {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: var(--text-color);
            opacity: 0.8;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 22px;
            flex-wrap: wrap;
        }

        .social-icons a {
            color: var(--text-color);
            font-size: 1.7rem;
            transition: 0.2s;
            opacity: 0.7;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .social-icons a:hover {
            opacity: 1;
            transform: translateY(-3px);
            color: var(--accent-color);
        }

        .unstop-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            background: var(--text-color);
            border-radius: 50%;
            transition: 0.2s;
        }

        .unstop-logo span {
            font-weight: 800;
            font-size: 12px;
            color: var(--form-bg);
        }

        .unstop-logo:hover {
            background: var(--accent-color);
            transform: scale(1.05);
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg);}
        }

        .sample-btn {
            background: none;
            border: none;
            font-size: 0.7rem;
            color: var(--accent-color);
            cursor: pointer;
            margin-left: 6px;
            opacity: 0.7;
        }

        .sample-btn:hover {
            opacity: 1;
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            .form-box { padding: 1.5rem; }
            .title { font-size: 1.6rem; }
            .input-box input, .input-box select { padding: 10px 12px 10px 38px; }
        }
    </style>
</head>
<body>
    <i class='bx bx-moon mode-toggle' id="darkModeToggle"></i>
    <div class="flip-container">
        <div class="flip-box">
            <!-- CROP FORM -->
            <div class="form-box crop-box">
                <h2 class="title">🌾 Crop Advisor</h2>
                <form id="cropForm">
                    <div class="input-box"><label>🌱 Nitrogen (N) <span style="font-weight:300">(kg/ha)</span></label><i class='bx bx-atom'></i><input type="number" step="0.1" id="N" placeholder="0 - 200" required></div>
                    <div class="input-box"><label>🌿 Phosphorus (P)</label><i class='bx bx-leaf'></i><input type="number" step="0.1" id="P" placeholder="0 - 150" required></div>
                    <div class="input-box"><label>🍂 Potassium (K)</label><i class='bx bx-test-tube'></i><input type="number" step="0.1" id="K" placeholder="0 - 200" required></div>
                    <div class="input-box"><label>🌡️ Temperature (°C)</label><i class="fas fa-thermometer-half"></i><input type="number" step="0.1" id="temperature" placeholder="8 - 45" required></div>
                    <div class="input-box"><label>💧 Humidity (%)</label><i class='bx bx-water'></i><input type="number" step="0.1" id="humidity" placeholder="20 - 95" required></div>
                    <div class="input-box"><label>⚗️ pH Level (0-14)</label><i class='bx bx-test-tube'></i><input type="number" step="0.1" id="ph" placeholder="4.5 - 9.5" required></div>
                    <div class="input-box"><label>☔ Rainfall (mm)</label><i class='bx bx-cloud-drizzle'></i><input type="number" step="0.1" id="rain" placeholder="20 - 400" required></div>
                    <button type="submit" class="btn" id="cropSubmitBtn">🌾 Recommend Crop <i class='bx bx-search-alt'></i></button>
                </form>
                <div class="result-box" id="cropResult"><h5 class="result-title"><i class='bx bx-check-circle'></i> Recommended Crop</h5><p id="cropResultText" class="recommend-text"></p></div>
                <div class="toggle-link"><a onclick="toggleForm()">🔄 Switch to Fertilizer Advisor</a></div>
                <div class="follow-section">
                    <h3>🌍 CONNECT WITH AGRI COMMUNITY</h3>
                    <div class="social-icons">
                        <a href="https://github.com/agritech-labs" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class='bx bxl-github'></i></a>
                        <a href="https://linkedin.com/company/agri-recommender-system" target="_blank" rel="noopener noreferrer"><i class='bx bxl-linkedin-square'></i></a>
                        <a href="https://discord.gg/agrihub" target="_blank" rel="noopener noreferrer"><i class='bx bxl-discord'></i></a>
                        <a href="https://unstop.com/agri-challenge" target="_blank" class="unstop-logo"><span>un</span></a>
                        <a href="https://x.com/agri_smart" target="_blank" rel="noopener noreferrer"><i class='bx bxl-twitter'></i></a>
                    </div>
                </div>
            </div>

            <!-- FERTILIZER FORM -->
            <div class="form-box fertilizer-box">
                <h2 class="title">🧪 Fertilizer Guide</h2>
                <form id="fertilizerForm">
                    <div class="input-box"><label>🌡️ Temperature (°C)</label><i class="fas fa-thermometer-half"></i><input type="number" step="0.1" id="f_temperature" required></div>
                    <div class="input-box"><label>💧 Humidity (%)</label><i class='bx bx-water'></i><input type="number" step="0.1" id="f_humidity" required></div>
                    <div class="input-box"><label>💧 Soil Moisture (%)</label><i class='bx bx-cloud-rain'></i><input type="number" step="0.1" id="moisture" required></div>
                    <div class="input-box"><label>🌍 Soil Type</label><i class='bx bx-globe'></i><select id="soil_type" required><option value="" disabled selected>Select soil</option><option value="Black">Black (Volcanic)</option><option value="Clayey">Clayey</option><option value="Loamy">Loamy</option><option value="Red">Red Laterite</option><option value="Sandy">Sandy</option></select></div>
                    <div class="input-box"><label>🌾 Crop Type</label><i class='bx bx-leaf'></i><select id="crop_type" required><option value="" disabled selected>Select crop</option><option value="Barley">Barley</option><option value="Cotton">Cotton</option><option value="Ground Nuts">Ground Nuts</option><option value="Maize">Maize</option><option value="Millets">Millets</option><option value="Oil seeds">Oil seeds</option><option value="Paddy">Paddy</option><option value="Pulses">Pulses</option><option value="Sugarcane">Sugarcane</option><option value="Tobacco">Tobacco</option><option value="Wheat">Wheat</option></select></div>
                    <div class="input-box"><label>🧪 Nitrogen (N) (kg/ha)</label><i class='bx bx-atom'></i><input type="number" step="0.1" id="f_N" required></div>
                    <div class="input-box"><label>🧪 Phosphorus (P) (kg/ha)</label><i class='bx bx-leaf'></i><input type="number" step="0.1" id="f_P" required></div>
                    <div class="input-box"><label>🧪 Potassium (K) (kg/ha)</label><i class='bx bx-test-tube'></i><input type="number" step="0.1" id="f_K" required></div>
                    <button type="submit" class="btn" id="fertSubmitBtn">🌿 Suggest Fertilizer <i class='bx bx-flask'></i></button>
                </form>
                <div class="result-box" id="fertilizerResult"><h5 class="result-title"><i class='bx bx-leaf'></i> Recommended Fertilizer</h5><p id="fertilizerResultText" class="recommend-text"></p></div>
                <div class="toggle-link"><a onclick="toggleForm()">🔄 Switch to Crop Advisor</a></div>
            </div>
        </div>
    </div>

    <script>
        // ---------- ENHANCED MOCK PREDICTION ENGINE (fully self-contained) ----------
        // Crop recommendation logic (smart rule-based)
        const cropDatabase = [
            "Rice", "Wheat", "Maize", "Cotton", "Sugarcane", "Millets", 
            "Ground Nuts", "Pulses", "Barley", "Oil seeds", "Tobacco", "Paddy"
        ];

        function recommendCrop({ N, P, K, temperature, humidity, ph, rainfall }) {
            // intelligent scoring for each crop
            let scores = {};
            cropDatabase.forEach(crop => { scores[crop] = 0; });
            
            // Rice: high rainfall, high humidity, temp 20-36
            if(rainfall > 180 && humidity > 70 && temperature >= 20 && temperature <= 36) scores["Rice"] += 40;
            if(ph >= 5.5 && ph <= 7) scores["Rice"] += 15;
            
            // Wheat: cool, moderate rain
            if(temperature >= 12 && temperature <= 24 && rainfall >= 40 && rainfall <= 110) scores["Wheat"] += 45;
            if(ph >= 6 && ph <= 7.5) scores["Wheat"] += 15;
            
            // Maize: moderate temp, medium rainfall
            if(temperature >= 18 && temperature <= 32 && rainfall >= 50 && rainfall <= 160) scores["Maize"] += 35;
            if(N > 50 && P > 30) scores["Maize"] += 20;
            
            // Cotton: hot, lower rain, well drained
            if(temperature >= 24 && temperature <= 38 && rainfall >= 45 && rainfall <= 100) scores["Cotton"] += 40;
            if(ph >= 6.5 && ph <= 8) scores["Cotton"] += 15;
            
            // Sugarcane: high temp, high humidity, high rainfall
            if(temperature >= 21 && temperature <= 34 && humidity > 65 && rainfall > 100) scores["Sugarcane"] += 50;
            if(K > 40) scores["Sugarcane"] += 15;
            
            // Millets: drought hardy, high temp, low rain
            if(temperature > 25 && rainfall < 90 && humidity < 60) scores["Millets"] += 45;
            if(ph >= 6 && ph <= 8) scores["Millets"] += 10;
            
            // Ground Nuts: sandy-loam, moderate rain
            if(rainfall >= 50 && rainfall <= 120 && temperature > 22 && temperature < 35) scores["Ground Nuts"] += 35;
            if(P > 25) scores["Ground Nuts"] += 15;
            
            // Pulses: low N requirement, moderate conditions
            if(N < 60 && temperature > 18 && temperature < 32 && rainfall >= 40 && rainfall <= 100) scores["Pulses"] += 45;
            if(ph >= 6 && ph <= 7.5) scores["Pulses"] += 12;
            
            // Barley: cool season, moderate
            if(temperature >= 10 && temperature <= 22 && rainfall >= 35 && rainfall <= 90) scores["Barley"] += 40;
            
            // Oil seeds: moderate rainfall, temp 20-30
            if(temperature >= 20 && temperature <= 32 && rainfall >= 60 && rainfall <= 130) scores["Oil seeds"] += 35;
            if(P > 20 && K > 20) scores["Oil seeds"] += 12;
            
            // Tobacco: warm, moderate moisture
            if(temperature >= 20 && temperature <= 34 && rainfall >= 50 && rainfall <= 120 && humidity < 75) scores["Tobacco"] += 35;
            
            // Paddy: like rice but also adapts
            if(rainfall > 150 && humidity > 68 && temperature >= 20 && temperature <= 37) scores["Paddy"] += 38;
            if(ph >= 5.2 && ph <= 7) scores["Paddy"] += 12;
            
            // additional pH and NPK adjustments for generic
            for(let crop in scores) {
                if(ph >= 5.5 && ph <= 8) scores[crop] += 5;
                if(N > 70 && (crop === "Maize" || crop === "Sugarcane" || crop === "Paddy")) scores[crop] += 10;
                if(P < 20 && (crop === "Pulses" || crop === "Ground Nuts")) scores[crop] += 8;
            }
            
            let bestCrop = cropDatabase.reduce((a,b) => scores[a] > scores[b] ? a : b, cropDatabase[0]);
            if(scores[bestCrop] < 15) bestCrop = "Maize (general adaptive)";
            return `${bestCrop} 🌟 (based on soil & climate data)`;
        }

        // Fertilizer recommendation: detailed suggestions
        function recommendFertilizer({ temperature, humidity, moisture, soil_type, crop_type, N, P, K }) {
            let advice = "";
            let deficit = [];
            if(N < 35) deficit.push("Nitrogen (N)");
            if(P < 25) deficit.push("Phosphorus (P)");
            if(K < 30) deficit.push("Potassium (K)");
            
            let primary = "";
            if(deficit.length === 0) primary = "Balanced soil fertility ✅ Use slow-release organic compost or maintain with 19:19:19 complex fertilizer.";
            else if(deficit.length === 1) primary = `Apply ${deficit[0]} rich fertilizer: `;
            else primary = `Multiple deficiencies (${deficit.join(", ")}). Apply a balanced blend: `;
            
            let specific = "";
            if(N < 35 && (P >= 25 || K >= 30)) specific = "Urea (46-0-0) or Ammonium Sulphate for quick N boost.";
            else if(P < 25 && N >= 35) specific = "Single Super Phosphate (SSP) or DAP (18-46-0) for phosphorus.";
            else if(K < 30 && N >= 35) specific = "Muriate of Potash (MOP) 0-0-60 for potassium.";
            else if(N < 35 && P < 25 && K < 30) specific = "NPK 12-32-16 or 10-26-26 complex fertilizer.";
            else if(N > 70 && P > 45 && K > 45) specific = "Reduce chemical input; apply green manure & bio-fertilizers (Azotobacter, PSB).";
            else specific = "Apply recommended grade NPK 20-20-20 along with micronutrients (Zn, Boron).";
            
            // soil & crop nuance
            if(soil_type === "Sandy") advice = "Sandy soil: low retention → split doses, use slow-release or organic manure.";
            else if(soil_type === "Clayey") advice = "Clay soil: use basal application, avoid waterlogging, add gypsum if needed.";
            else if(soil_type === "Black") advice = "Black soil: good for cotton/sugarcane, ensure potash supplementation.";
            else if(soil_type === "Loamy") advice = "Loamy ideal soil: balanced nutrition recommended.";
            else advice = "Adjust based on soil test report.";
            
            if(crop_type === "Sugarcane") specific += " Also apply Zinc sulphate & pressmud for higher yield.";
            if(crop_type === "Paddy") specific += " For rice, prefer split N application and incorporate green manure.";
            if(crop_type === "Pulses") specific = "Pulses require less N; use Rhizobium culture + SSP.";
            
            let finalMsg = primary + " " + specific + " | " + advice;
            if(temperature > 35) finalMsg += " 🔥 High temp: irrigate after fertilizer application.";
            if(moisture < 25) finalMsg += " 💧 Low moisture: delay top dressing until irrigation.";
            return finalMsg;
        }

        // Helper: show loading & async delay for realism
        function simulateAsync(task, resultBox, resultText, callback) {
            const originalText = resultBox.querySelector('.btn')?.innerHTML;
            const btn = resultBox.closest('.form-box')?.querySelector('.btn');
            if(btn) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span> Analyzing...';
            }
            setTimeout(() => {
                const output = callback();
                resultText.innerText = output;
                resultBox.classList.add('show');
                if(btn) {
                    btn.disabled = false;
                    btn.innerHTML = btn.id.includes('crop') ? '🌾 Recommend Crop <i class="bx bx-search-alt"></i>' : '🌿 Suggest Fertilizer <i class="bx bx-flask"></i>';
                }
            }, 400);
        }

        // Crop submission handler
        document.getElementById('cropForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const N = parseFloat(document.getElementById('N').value);
            const P = parseFloat(document.getElementById('P').value);
            const K = parseFloat(document.getElementById('K').value);
            const temperature = parseFloat(document.getElementById('temperature').value);
            const humidity = parseFloat(document.getElementById('humidity').value);
            const ph = parseFloat(document.getElementById('ph').value);
            const rain = parseFloat(document.getElementById('rain').value);
            
            // validation
            if(ph < 0 || ph > 14) { alert("pH must be between 0 and 14"); return; }
            if(temperature < -5 || temperature > 55) { alert("Temperature out of realistic range (-5°C to 55°C)"); return; }
            if(humidity < 0 || humidity > 100) { alert("Humidity 0-100%"); return; }
            
            const resultBox = document.getElementById('cropResult');
            const resultText = document.getElementById('cropResultText');
            resultBox.classList.remove('show');
            
            simulateAsync('crop', resultBox, resultText, () => {
                return recommendCrop({ N, P, K, temperature, humidity, ph, rainfall: rain });
            });
        });
        
        // Fertilizer handler
        document.getElementById('fertilizerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const temperature = parseFloat(document.getElementById('f_temperature').value);
            const humidity = parseFloat(document.getElementById('f_humidity').value);
            const moisture = parseFloat(document.getElementById('moisture').value);
            const soil_type = document.getElementById('soil_type').value;
            const crop_type = document.getElementById('crop_type').value;
            const N = parseFloat(document.getElementById('f_N').value);
            const P = parseFloat(document.getElementById('f_P').value);
            const K = parseFloat(document.getElementById('f_K').value);
            
            if(!soil_type || !crop_type) { alert("Please select soil & crop type"); return; }
            if(temperature < -5 || temperature > 55) { alert("Check temperature range"); return; }
            if(moisture < 0 || moisture > 100) { alert("Moisture 0-100%"); return; }
            
            const resultBox = document.getElementById('fertilizerResult');
            const resultText = document.getElementById('fertilizerResultText');
            resultBox.classList.remove('show');
            
            simulateAsync('fert', resultBox, resultText, () => {
                return recommendFertilizer({ temperature, humidity, moisture, soil_type, crop_type, N, P, K });
            });
        });
        
        // Flip + reset result visibility
        function toggleForm() {
            const flipBox = document.querySelector('.flip-box');
            flipBox.classList.toggle('active');
            document.getElementById('cropResult')?.classList.remove('show');
            document.getElementById('fertilizerResult')?.classList.remove('show');
        }
        
        // Dark mode with local storage
        function initDarkMode() {
            const toggleBtn = document.getElementById('darkModeToggle');
            const isDark = localStorage.getItem('agriDarkMode') === 'true';
            if(isDark) document.body.classList.add('dark-mode');
            toggleBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const darkNow = document.body.classList.contains('dark-mode');
                localStorage.setItem('agriDarkMode', darkNow);
                toggleBtn.classList.toggle('bx-moon');
                toggleBtn.classList.toggle('bx-sun');
                if(darkNow) toggleBtn.classList.add('bx-sun');
                else toggleBtn.classList.add('bx-moon');
            });
            if(isDark) toggleBtn.classList.add('bx-sun');
            else toggleBtn.classList.add('bx-moon');
        }
        
        // small sample data prefill helpers (UX enhancement)
        document.querySelectorAll('.crop-box .input-box input').forEach(inp => {
            inp.addEventListener('focus', function(){ if(!this.value) this.placeholder = "e.g., 75"; });
        });
        // Optional quick sample (add hidden buttons not to clutter but user friendly)
        const addSampleButtons = () => {
            const cropFormDiv = document.querySelector('.crop-box');
            const sampleSpan = document.createElement('div');
            sampleSpan.style.textAlign = 'right';
            sampleSpan.style.marginTop = '-12px';
            sampleSpan.style.marginBottom = '12px';
            sampleSpan.innerHTML = '<button type="button" class="sample-btn" id="sampleCropData">📋 Fill sample data</button>';
            cropFormDiv.insertBefore(sampleSpan, cropFormDiv.querySelector('#cropForm'));
            document.getElementById('sampleCropData')?.addEventListener('click', () => {
                document.getElementById('N').value = 78;
                document.getElementById('P').value = 42;
                document.getElementById('K').value = 48;
                document.getElementById('temperature').value = 26.5;
                document.getElementById('humidity').value = 72;
                document.getElementById('ph').value = 6.8;
                document.getElementById('rain').value = 210;
            });
            
            const fertDiv = document.querySelector('.fertilizer-box');
            const fertSample = document.createElement('div');
            fertSample.style.textAlign = 'right';
            fertSample.style.marginTop = '-12px';
            fertSample.style.marginBottom = '12px';
            fertSample.innerHTML = '<button type="button" class="sample-btn" id="sampleFertData">🌱 Demo values</button>';
            fertDiv.insertBefore(fertSample, fertDiv.querySelector('#fertilizerForm'));
            document.getElementById('sampleFertData')?.addEventListener('click', () => {
                document.getElementById('f_temperature').value = 29;
                document.getElementById('f_humidity').value = 68;
                document.getElementById('moisture').value = 45;
                document.getElementById('soil_type').value = 'Loamy';
                document.getElementById('crop_type').value = 'Maize';
                document.getElementById('f_N').value = 42;
                document.getElementById('f_P').value = 28;
                document.getElementById('f_K').value = 34;
            });
        };
        
        // run init
        window.onload = () => {
            initDarkMode();
            addSampleButtons();
            // additional smoothness for first load
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('flip') === 'fert') toggleForm();
        };
    </script>
</body>
</html>
